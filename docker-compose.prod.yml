# Production stack for Portainer.
# Unlike docker-compose.yml (which builds the bot locally), this pulls the
# prebuilt image that GitHub Actions published to GHCR. Point your Portainer
# "Add stack -> Repository" at this file.
#
# Set these as STACK ENVIRONMENT VARIABLES in Portainer (never commit them):
#   DISCORD_TOKEN      (required)
#   LAVALINK_PASSWORD  (recommended: a strong value)
#   DEV_GUILD_ID       (optional)
#   LOG_LEVEL          (optional, default INFO)
#   BOT_IMAGE          (optional: pin a specific tag for rollback,
#                       e.g. ghcr.io/raaid17/tobias:sha-1a2b3c4)

services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    restart: unless-stopped
    # Configured via environment variables instead of a mounted application.yml.
    # Portainer Git stacks don't reliably resolve relative bind-mount paths, so
    # the mounted file was ignored and Lavalink fell back to Spring defaults
    # (port 8080, no plugins). Env vars work regardless of deploy method.
    environment:
      SERVER_PORT: "2333"
      SERVER_ADDRESS: "0.0.0.0"
      LAVALINK_SERVER_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
      # Use the youtube-source plugin instead of the deprecated built-in source.
      LAVALINK_SERVER_SOURCES_YOUTUBE: "false"
      LAVALINK_PLUGINS_0_DEPENDENCY: "dev.lavalink.youtube:youtube-plugin:1.13.0"
      LAVALINK_PLUGINS_0_REPOSITORY: "https://maven.lavalink.dev/releases"
      PLUGINS_YOUTUBE_ENABLED: "true"
      _JAVA_OPTIONS: -Xmx512m
    volumes:
      # Persist the downloaded plugin jar across restarts.
      - lavalink-plugins:/opt/Lavalink/plugins
    networks:
      - bot-net

  bot:
    image: ${BOT_IMAGE:-ghcr.io/raaid17/tobias:latest}
    container_name: discord-bot
    restart: unless-stopped
    # Always pull the newest image on (re)deploy so the webhook ships updates.
    pull_policy: always
    depends_on:
      - lavalink
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?set DISCORD_TOKEN as a stack environment variable}
      DEV_GUILD_ID: ${DEV_GUILD_ID:-}
      LAVALINK_URI: http://lavalink:2333
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - bot-net

networks:
  bot-net:
    driver: bridge

volumes:
  lavalink-plugins:
