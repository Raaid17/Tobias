name: Build and Deploy

# Push to main -> build the bot image -> push to GHCR -> tell Portainer to redeploy.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Resolves to ghcr.io/<owner>/<repo>; metadata-action lowercases it for GHCR.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  redeploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Portainer lives on a Tailscale-only host, so first decide whether the
      # webhook is configured. Before the secret exists this job stays green and
      # skips the Tailscale join + redeploy.
      - name: Check webhook configured
        id: check
        env:
          WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "PORTAINER_WEBHOOK_URL not set - skipping redeploy."
            echo "Add it (plus the TS_OAUTH_* secrets) under repo Settings ->"
            echo "Secrets and variables -> Actions once Portainer is set up."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      # Join the runner to the tailnet as an ephemeral, tagged node so it can
      # reach the *.ts.net Portainer host.
      - name: Connect to Tailscale
        if: steps.check.outputs.configured == 'true'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Trigger Portainer redeploy
        if: steps.check.outputs.configured == 'true'
        env:
          WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          echo "Triggering Portainer stack redeploy over Tailscale..."
          # -k: Portainer's :9443 uses a self-signed cert; the Tailscale tunnel
          # already authenticates and encrypts the connection.
          curl -fsSL -k -X POST "$WEBHOOK"
          echo "Redeploy triggered."
